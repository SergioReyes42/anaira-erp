# nixpacks.toml

[phases.setup]
nixPkgs = ["postgresql", "gcc", "python3"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput", "python manage.py migrate"]

[providers]
# Forzamos que instale los planos de C (Cairo y Pango) antes de instalar Python
[phases.setup]
nixPkgs = ["cairo", "pango", "pkg-config", "python3"]
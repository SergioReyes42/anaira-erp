{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0 border-top border-4 border-warning">
                <div class="card-header bg-white pt-4 pb-2 text-center border-0">
                    <h4 class="mb-0 fw-bold text-dark"><i class="bi bi-file-earmark-plus text-warning me-2"></i>Registrar Cuenta por Pagar</h4>
                    <p class="text-muted small">Ingresar factura de proveedor al pasivo de la empresa</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">Nombre del Proveedor</label>
                                <input type="text" name="supplier_name" class="form-control bg-light" placeholder="Ej. Tigo, Cervecería, Shell..." required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">No. de Factura / Recibo</label>
                                <input type="text" name="invoice_number" class="form-control bg-light border-secondary" placeholder="Ej. Serie A - 10923" required>
                            </div>
                        </div>

                        <div class="row mb-4 bg-light p-3 rounded">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-secondary">Fecha de Emisión</label>
                                <input type="date" name="issue_date" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-danger"><i class="bi bi-calendar-x"></i> Fecha Vencimiento</label>
                                <input type="date" name="due_date" class="form-control border-danger" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-dark">Monto Total (Q.)</label>
                                <input type="number" step="0.01" min="0.01" name="total_amount" class="form-control border-dark fw-bold" placeholder="0.00" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold small text-muted">Concepto del Gasto</label>
                            <textarea name="description" class="form-control bg-light" rows="2" placeholder="Detalle de los servicios o productos adquiridos..." required></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{% url 'accounting:cxp_dashboard' %}" class="btn btn-light px-4">Cancelar</a>
                            <button type="submit" class="btn btn-warning px-4 shadow-sm text-dark fw-bold"><i class="bi bi-save me-2"></i> Guardar Deuda</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-bank me-2"></i>Aperturar Nueva Cuenta Bancaria</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nombre del Banco</label>
                                <input type="text" name="bank_name" class="form-control" placeholder="Ej. Banrural, Banco Industrial..." required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Nombre de la Cuenta</label>
                                <input type="text" name="account_name" class="form-control" placeholder="Ej. Monetaria Principal, Planilla..." required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Número de Cuenta</label>
                                <input type="text" name="account_number" class="form-control" placeholder="No. de cuenta completo" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Moneda</label>
                                <select name="currency" class="form-select" required>
                                    <option value="GTQ">Quetzales (Q.)</option>
                                    <option value="USD">Dólares ($)</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Saldo Inicial en Sistema</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light fw-bold">Monto</span>
                                <input type="number" step="0.01" min="0.00" name="initial_balance" class="form-control" placeholder="0.00" required>
                            </div>
                            <small class="text-muted">Este es el saldo real con el que arranca la cuenta en el ERP hoy.</small>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'accounting:bank_dashboard' %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-primary"><i class="bi bi-save me-1"></i> Guardar Cuenta</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

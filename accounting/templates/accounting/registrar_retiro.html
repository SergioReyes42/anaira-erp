{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-arrow-down-circle me-2"></i>Registrar Retiro / Egreso</h4>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Fecha del Retiro</label>
                                <input type="date" name="date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Cuenta Bancaria</label>
                                <select name="bank_account" class="form-select" required>
                                    <option value="">Seleccione una cuenta...</option>
                                    {% for cuenta in cuentas %}
                                        <option value="{{ cuenta.id }}">{{ cuenta.bank_name }} - {{ cuenta.account_number }} (Saldo: Q.{{ cuenta.balance }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">Monto (Q.)</label>
                                <input type="number" step="0.01" min="0.01" name="amount" class="form-control" placeholder="0.00" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold">No. de Referencia / Cheque</label>
                                <input type="text" name="reference" class="form-control" placeholder="Ej. CHQ-10293">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Descripción / Motivo</label>
                            <textarea name="description" class="form-control" rows="2" placeholder="Detalle del retiro..." required></textarea>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'accounting:panel_bancos' %}" class="btn btn-secondary">Cancelar</a>
                            <button type="submit" class="btn btn-danger"><i class="bi bi-check2-circle me-1"></i> Confirmar Retiro</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0 border-top border-4 border-primary">
                <div class="card-header bg-white pt-4 pb-2 text-center border-0">
                    <h4 class="mb-0 fw-bold text-dark"><i class="bi bi-credit-card-fill text-primary me-2"></i>Registrar Nueva Tarjeta</h4>
                    <p class="text-muted small">Configuración de límites y fechas de corte</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">Banco Emisor</label>
                                <input type="text" name="bank_name" class="form-control bg-light" placeholder="Ej. Promerica, BAC..." required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">Nombre Interno (Alias)</label>
                                <input type="text" name="card_name" class="form-control bg-light" placeholder="Ej. Visa Flotilla 1" required>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted">Últimos 4 Dígitos</label>
                                <input type="text" name="last_four_digits" class="form-control bg-light" maxlength="4" placeholder="Ej. 4092" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small text-muted text-primary">Límite de Crédito (Q.)</label>
                                <input type="number" step="0.01" min="0.01" name="credit_limit" class="form-control border-primary" placeholder="0.00" required>
                            </div>
                        </div>

                        <hr class="text-muted opacity-25 mb-4">

                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted">Día de Corte</label>
                                <input type="number" min="1" max="31" name="cutoff_day" class="form-control bg-light" placeholder="1 al 31" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted">Día de Pago</label>
                                <input type="number" min="1" max="31" name="payment_day" class="form-control bg-light" placeholder="1 al 31" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted text-danger">Deuda Actual (Q.)</label>
                                <input type="number" step="0.01" min="0.00" name="current_debt" class="form-control border-danger" placeholder="0.00" value="0.00" required>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{% url 'accounting:panel_tarjetas' %}" class="btn btn-light px-4">Cancelar</a>
                            <button type="submit" class="btn btn-primary px-4 shadow-sm"><i class="bi bi-save me-2"></i> Guardar Tarjeta</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

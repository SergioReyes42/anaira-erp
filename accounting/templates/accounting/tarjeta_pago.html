{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow border-0 border-top border-4 border-success">
                <div class="card-header bg-white pt-4 pb-2 text-center border-0">
                    <h4 class="mb-0 fw-bold text-dark"><i class="bi bi-cash-coin text-success me-2"></i>Pago de Tarjeta de Crédito</h4>
                    <p class="text-muted small">Rebajar deuda transfiriendo fondos desde el banco</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="row mb-4 bg-light p-3 rounded">
                            <div class="col-md-5">
                                <label class="form-label fw-bold text-secondary"><i class="bi bi-bank"></i> Cuenta Origen (Sale dinero)</label>
                                <select name="cuenta_origen" class="form-select" required>
                                    <option value="">Seleccione cuenta bancaria...</option>
                                    {% for c in cuentas %}
                                        <option value="{{ c.id }}">{{ c.bank_name }} (Q.{{ c.balance|floatformat:2 }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-2 d-flex align-items-center justify-content-center">
                                <i class="bi bi-arrow-right-circle-fill text-success fs-2 mt-3"></i>
                            </div>
                            <div class="col-md-5">
                                <label class="form-label fw-bold text-danger"><i class="bi bi-credit-card"></i> Tarjeta a Pagar (Baja deuda)</label>
                                <select name="tarjeta_id" class="form-select border-danger" required>
                                    <option value="">Seleccione tarjeta...</option>
                                    {% for t in tarjetas %}
                                        <option value="{{ t.id }}">{{ t.card_name }} (Debe: Q.{{ t.current_debt|floatformat:2 }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="row mb-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">Fecha de Pago</label>
                                <input type="date" name="date" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-success">Monto a Pagar (Q.)</label>
                                <input type="number" step="0.01" min="0.01" name="amount" class="form-control fw-bold border-success" placeholder="0.00" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold small">No. de Confirmación</label>
                                <input type="text" name="reference" class="form-control" placeholder="Ej. PGO-10923" required>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{% url 'accounting:panel_tarjetas' %}" class="btn btn-light px-4">Cancelar</a>
                            <button type="submit" class="btn btn-success px-4 shadow-sm text-white fw-bold"><i class="bi bi-shield-check me-2"></i> Procesar Pago</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

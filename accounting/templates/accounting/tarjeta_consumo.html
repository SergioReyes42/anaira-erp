{% extends 'base.html' %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0 border-top border-4 border-danger">
                <div class="card-header bg-white pt-4 pb-2 text-center border-0">
                    <h4 class="mb-0 fw-bold text-dark"><i class="bi bi-cart-dash text-danger me-2"></i>Registrar Consumo</h4>
                    <p class="text-muted small">Cargar un nuevo gasto a la tarjeta (Aumenta la deuda)</p>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Seleccionar Tarjeta</label>
                            <select name="tarjeta_id" class="form-select border-danger" required>
                                <option value="">Elija la tarjeta que se usó...</option>
                                {% for t in tarjetas %}
                                    <option value="{{ t.id }}">{{ t.card_name }} (Disp: Q.{{ t.available_credit|floatformat:2 }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small text-danger">Monto del Consumo (Q.)</label>
                            <input type="number" step="0.01" min="0.01" name="amount" class="form-control fw-bold" placeholder="0.00" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Descripción / Comercio</label>
                            <textarea name="description" class="form-control" rows="2" placeholder="Ej. Gasolina Shell zona 9..." required></textarea>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <a href="{% url 'accounting:panel_tarjetas' %}" class="btn btn-light px-4">Cancelar</a>
                            <button type="submit" class="btn btn-danger px-4 shadow-sm"><i class="bi bi-check2-circle me-1"></i> Cargar Gasto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
